version: "3.8"

services:
  web:
    build: .
    command: sh -c "python manage.py migrate && gunicorn --bind 0.0.0.0:8000 portbackend.wsgi:application"
    ports:
      - "8000:8000"
    volumes:
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://portfolio_user:portfolio_pass@db:5432/portfolio_db
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=portfolio_db
      - POSTGRES_USER=portfolio_user
      - POSTGRES_PASSWORD=portfolio_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  media_volume:
  postgres_data:
